name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set unique CI package version
        id: ci-version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          pyproject = pathlib.Path("pyproject.toml")
          init_file = pathlib.Path("agent_vars/__init__.py")
          pyproject_text = pyproject.read_text(encoding="utf-8")
          match = re.search(r'^version = "([^"]+)"', pyproject_text, re.MULTILINE)
          if not match:
              raise SystemExit("project version not found in pyproject.toml")

          base_version = match.group(1).split(".post", 1)[0]
          post_number = int(os.environ["GITHUB_RUN_NUMBER"]) * 1000 + int(os.environ["GITHUB_RUN_ATTEMPT"])
          ci_version = f"{base_version}.post{post_number}"

          pyproject.write_text(
              re.sub(r'^version = "[^"]+"', f'version = "{ci_version}"', pyproject_text, count=1, flags=re.MULTILINE),
              encoding="utf-8",
          )
          init_text = init_file.read_text(encoding="utf-8")
          init_file.write_text(
              re.sub(r'^__version__ = "[^"]+"', f'__version__ = "{ci_version}"', init_text, count=1, flags=re.MULTILINE),
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={ci_version}\n")
          print(f"CI package version: {ci_version}")
          PY

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/agent-vars/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
